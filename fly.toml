app = "lumina-backend"
primary_region = "nrt"

[build]

[env]
  DATABASE_URL = "sqlite+aiosqlite:////data/lumina.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "lumina_data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
